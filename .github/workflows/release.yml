name: Release desktop

# Tag namespace: `desktop-v<semver>` triggers desktop Tauri bundles.
# Plain `v<semver>` tags are reserved for the npm CLI release (see
# publish-npm.yml) — they intentionally do NOT trigger this workflow.
# Bump the desktop with: `git tag desktop-vX.Y.Z && git push origin desktop-vX.Y.Z`.
on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. desktop-v0.47.0). Required when running manually."
        required: true
        type: string
      target_label:
        description: "Optional target label to build (e.g. windows-arm64). Leave empty for all targets."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  resolve-matrix:
    name: resolve target matrix
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - name: Resolve target matrix
        id: matrix
        shell: bash
        env:
          TARGET_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.target_label || '' }}
        run: |
          targets="$(cat <<'JSON'
          [
            {"os":"ubuntu-22.04","label":"linux-x64","rust":"x86_64-unknown-linux-gnu","tauri":"x86_64-unknown-linux-gnu","verifyTarget":"x86_64-unknown-linux-gnu","bundles":"--bundles deb","args":"--target x86_64-unknown-linux-gnu --bundles deb"},
            {"os":"ubuntu-22.04-arm","label":"linux-arm64","rust":"aarch64-unknown-linux-gnu","tauri":"","verifyTarget":"","bundles":"--bundles deb","args":"--bundles deb"},
            {"os":"macos-15-intel","label":"macos-x64","rust":"x86_64-apple-darwin","tauri":"x86_64-apple-darwin","verifyTarget":"x86_64-apple-darwin","bundles":"--bundles dmg","args":"--target x86_64-apple-darwin --bundles dmg"},
            {"os":"macos-14","label":"macos-arm64","rust":"aarch64-apple-darwin","tauri":"aarch64-apple-darwin","verifyTarget":"aarch64-apple-darwin","bundles":"--bundles dmg","args":"--target aarch64-apple-darwin --bundles dmg"},
            {"os":"windows-latest","label":"windows-x64","rust":"x86_64-pc-windows-msvc","tauri":"x86_64-pc-windows-msvc","verifyTarget":"x86_64-pc-windows-msvc","bundles":"--bundles nsis","args":"--target x86_64-pc-windows-msvc --bundles nsis"},
            {"os":"windows-11-arm","label":"windows-arm64","rust":"aarch64-pc-windows-msvc","tauri":"aarch64-pc-windows-msvc","verifyTarget":"aarch64-pc-windows-msvc","bundles":"--bundles nsis","args":"--target aarch64-pc-windows-msvc --bundles nsis"}
          ]
          JSON
          )"

          if [ -n "$TARGET_LABEL" ]; then
            selected="$(jq -c --arg label "$TARGET_LABEL" '[.[] | select(.label == $label)]' <<< "$targets")"
            if [ "$selected" = "[]" ]; then
              echo "Unknown target_label: $TARGET_LABEL" >&2
              jq -r '.[].label' <<< "$targets" >&2
              exit 1
            fi
            targets="$selected"
          else
            targets="$(jq -c . <<< "$targets")"
          fi

          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  bundle:
    name: bundle (${{ matrix.target.label }})
    needs: resolve-matrix
    strategy:
      fail-fast: false
      matrix:
        # Release assets intentionally stay installer-focused:
        # Linux gets per-arch .deb packages plus an x86_64 Arch pacman package, macOS gets per-arch DMGs, Windows gets per-arch NSIS installers.
        target: ${{ fromJSON(needs.resolve-matrix.outputs.targets) }}
    runs-on: ${{ matrix.target.os }}
    # secrets.* isn't accessible from step-level if:, so expose presence as a
    # job-level env. Treat "true"/"false" strings as booleans downstream.
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust (${{ matrix.target.rust }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust }}

      - name: Rust cache
        if: matrix.target.label != 'linux-arm64'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.target.label }}

      - name: Install Linux bundle deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install root deps
        shell: bash
        run: |
          if [ "${{ matrix.target.label }}" = "linux-arm64" ] || [ "${{ matrix.target.label }}" = "windows-arm64" ]; then
            npm ci --ignore-scripts
            npm --prefix dashboard ci --ignore-scripts
          else
            npm ci
          fi

      - name: Sync desktop version from tag
        run: node scripts/sync-desktop-version.mjs "${{ steps.tag.outputs.name }}"

      - name: Build CLI bundle (dist/)
        run: npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Download bundled Node runtime
        working-directory: desktop
        run: npm run bundle:node

      - name: Verify bundled Node matches host arch (macOS)
        if: startsWith(matrix.target.os, 'macos-')
        working-directory: desktop
        run: |
          expected_arch=$(uname -m)
          archs=$(lipo -archs src-tauri/binaries/node)
          echo "node archs: $archs"
          echo "expected arch: $expected_arch"
          if [ "$archs" != "$expected_arch" ]; then
            echo "Expected $expected_arch Node, got: $archs" >&2
            exit 1
          fi
          codesign -d --entitlements :- src-tauri/binaries/node 2>&1 | grep -q "com.apple.security.inherit"

      - name: Verify bundled Node matches host arch (Linux)
        if: startsWith(matrix.target.os, 'ubuntu-')
        working-directory: desktop
        shell: bash
        run: |
          expected_arch="$(node -p 'process.arch')"
          bundled_arch="$(src-tauri/binaries/node -p 'process.arch')"
          echo "bundled Node arch: $bundled_arch"
          echo "expected arch: $expected_arch"
          if [ "$bundled_arch" != "$expected_arch" ]; then
            echo "Expected $expected_arch Node, got: $bundled_arch" >&2
            exit 1
          fi

      - name: Verify bundled Node matches host arch (Windows)
        if: runner.os == 'Windows'
        working-directory: desktop
        shell: bash
        run: |
          expected_arch="$(node -p 'process.arch')"
          bundled_arch="$(src-tauri/binaries/node.exe -p 'process.arch')"
          echo "bundled Node arch: $bundled_arch"
          echo "expected arch: $expected_arch"
          if [ "$bundled_arch" != "$expected_arch" ]; then
            echo "Expected $expected_arch Node, got: $bundled_arch" >&2
            exit 1
          fi

      - name: Build & verify desktop frontend
        working-directory: desktop
        shell: bash
        run: |
          npm run build
          test -f dist/index.html
          ls dist/assets/*.js >/dev/null

      # tauri-action treats empty signing env vars as present, so keep the
      # unsigned path separate from the optional macOS signing block.
      - name: Build Tauri bundle (unsigned)
        if: >-
          !startsWith(matrix.target.os, 'macos-') || env.HAS_APPLE_CERT != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: Jupiter ${{ steps.tag.outputs.name }}
          assetNamePattern: Jupiter_${{ steps.tag.outputs.name }}_${{ matrix.target.label }}[ext]
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target.args }}

      - name: Build Tauri bundle (macOS, signed + notarized)
        if: startsWith(matrix.target.os, 'macos-') && env.HAS_APPLE_CERT == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: Jupiter ${{ steps.tag.outputs.name }}
          assetNamePattern: Jupiter_${{ steps.tag.outputs.name }}_${{ matrix.target.label }}[ext]
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target.args }}

      - name: Verify requested installer exists
        working-directory: desktop
        shell: bash
        env:
          LABEL: ${{ matrix.target.label }}
          TARGET: ${{ matrix.target.verifyTarget }}
        run: |
          if [ -n "$TARGET" ]; then
            release_dir="src-tauri/target/$TARGET/release"
          else
            release_dir="src-tauri/target/release"
          fi

          case "$LABEL" in
            linux-*) pattern="$release_dir/bundle/deb/*.deb" ;;
            macos-*) pattern="$release_dir/bundle/dmg/*.dmg" ;;
            windows-*) pattern="$release_dir/bundle/nsis/*.exe" ;;
            *) echo "unknown label: $LABEL" >&2; exit 1 ;;
          esac
          shopt -s nullglob
          files=( $pattern )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer matched $pattern" >&2
            find src-tauri/target -maxdepth 8 -path '*/release/bundle/*' -type f || true
            exit 1
          fi
          printf 'Installer assets for %s:\n' "$LABEL"
          printf '  %s\n' "${files[@]}"

      - name: Verify app Node inherits TCC grants (macOS)
        if: startsWith(matrix.target.os, 'macos-') && env.HAS_APPLE_CERT == 'true'
        working-directory: desktop
        shell: bash
        run: |
          node_bin=$(find src-tauri/target -path '*/release/bundle/macos/*.app/Contents/Resources/node' -type f | head -n 1)
          test -n "$node_bin"
          codesign -vvv --strict "$node_bin"
          codesign -d --entitlements :- "$node_bin" 2>&1 | grep -q "com.apple.security.inherit"

  arch-package:
    name: package Arch Linux (linux-x64)
    needs: bundle
    if: github.event_name != 'workflow_dispatch' || inputs.target_label == '' || inputs.target_label == 'linux-x64'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux x64 deb from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          mkdir -p dist/release-assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Jupiter_${TAG}_linux-x64.deb" \
            --dir dist/release-assets \
            --clobber
          test -f "dist/release-assets/Jupiter_${TAG}_linux-x64.deb"

      - name: Build Arch pacman package
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          docker run --rm \
            -e TAG="$TAG" \
            -v "$PWD:/work" \
            -w /work \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm base-devel nodejs
              host_uid="$(stat -c "%u" /work)"
              host_gid="$(stat -c "%g" /work)"
              if ! getent group "$host_gid" >/dev/null; then
                groupadd -g "$host_gid" jupiterbuild
              fi
              useradd -m -u "$host_uid" -g "$host_gid" jupiterbuild
              su jupiterbuild -c "scripts/build-arch-package.sh --tag \"$TAG\" --deb \"dist/release-assets/Jupiter_${TAG}_linux-x64.deb\" --out dist/arch"
            '

      - name: Upload Arch pacman package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          gh release upload "$TAG" dist/arch/*.pkg.tar.zst --repo "$GITHUB_REPOSITORY" --clobber

  release-notes:
    name: publish release notes
    needs: bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish bilingual release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          notes=".github/release-notes/${TAG}.md"
          if [ ! -f "$notes" ]; then
            echo "Missing desktop release notes: $notes" >&2
            echo "Add a bilingual notes file before pushing the desktop release tag." >&2
            exit 1
          fi
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$notes"
